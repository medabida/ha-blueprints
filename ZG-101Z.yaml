blueprint:
  name: Tuya ZG-101Z/D Z2M Events
  description: >
    Automate Tuya Smart Knob (TS004F / ZG-101Z) using Zigbee2MQTT via MQTT triggers.
    Device must be paired through Zigbee2MQTT (not ZHA).
  domain: automation
  input:
    smart_knob:
      name: Smart Knob Device
      description: >-
        Select your Smart Knob as discovered by Zigbee2MQTT (MQTT integration).
      selector:
        device:
          integration: mqtt
          multiple: false

    target_light:
      name: Light to Control
      description: The light entity to brighten/dim with rotation.
      selector:
        entity:
          domain: light

    step_size:
      name: Brightness Step Size
      description: How much brightness to change per rotation step (%).
      default: 10
      selector:
        number:
          min: 10
          max: 100
          step: 10
          unit_of_measurement: "%"

    action_single_press:
      name: Single Press
      default: []
      selector:
        action: {}

    action_double_press:
      name: Double Press
      default: []
      selector:
        action: {}

    action_long_press:
      name: Long Press
      default: []
      selector:
        action: {}

variables:
  step_size: !input step_size

mode: restart
max_exceeded: silent

trigger:
  # --- ROTATE RIGHT ---
  - platform: device
    domain: mqtt
    device_id: !input smart_knob
    type: action
    subtype: rotate_right
    id: "rotate_right"

  # --- ROTATE LEFT ---
  - platform: device
    domain: mqtt
    device_id: !input smart_knob
    type: action
    subtype: rotate_left
    id: "rotate_left"

  # --- SINGLE PRESS ---
  - platform: device
    domain: mqtt
    device_id: !input smart_knob
    type: action
    subtype: single
    id: "single_press"

  # --- DOUBLE PRESS ---
  - platform: device
    domain: mqtt
    device_id: !input smart_knob
    type: action
    subtype: double
    id: "double_press"

  # --- LONG PRESS (HOLD) ---
  - platform: device
    domain: mqtt
    device_id: !input smart_knob
    type: action
    subtype: hold
    id: "long_press"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "rotate_right"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input target_light
            data:
              brightness_step_pct: "{{ step_size }}"

      - conditions:
          - condition: trigger
            id: "rotate_left"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input target_light
            data:
              brightness_step_pct: "{{ -step_size }}"

      - conditions:
          - condition: trigger
            id: "single_press"
        sequence: !input action_single_press

      - conditions:
          - condition: trigger
            id: "double_press"
        sequence: !input action_double_press

      - conditions:
          - condition: trigger
            id: "long_press"
        sequence: !input action_long_press
